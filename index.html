<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HwangSeyeon Introduction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page-container">
        <header class="header">
            <div class="logo">HiSeyeon</div>
            <nav class="nav">
                <a href="#home">Home</a>
                <a href="#about">About Me</a>
                <a href="#done">Experience</a>
                <a href="#interest">Interested</a>
                <a href="#contact">Contact</a>
            </nav>

        </header>

        <main>
            <!-- HOME -->
            <section id="home" class="section hero-section">
                <div class="hero-left">
                    <div class="memoji-area">
                        <img src="images/seyeon1.png" alt="memoji" class="memoji" />

                        <span class="floating emoji e1">⚾️</span>
                        <span class="floating emoji e2">💤</span>
                        <span class="floating emoji e3">🎮</span>
                        <span class="floating emoji e4">🍺</span>
                        <span class="floating emoji e5">🐕</span>
                        <span class="floating emoji e6">🛏️</span>
                        <span class="floating emoji e7">🍔</span>
                        <span class="floating emoji e8">🐈‍⬛</span>
                    </div>
                </div>

                <div class="hero-right">
                    <p class="hero-text">
                        안녕하세요!<br />
                        멋사 14기 아기사자 황세연 입니다!
                    </p>
                </div>
            </section>

            <!-- About Me -->
            <section id="about" class="section">
                <div class="section-card two-column">
                    <div class="image-box large-photo">
                        <img src="images/aboutme1.png" alt="about photo" />
                    </div>

                    <div class="text-box">
                        <h2>About Me</h2>
                        <div class="about-text">
                            <p>황세연</p>
                            <p>컴퓨터학과 22학번</p>
                            <p>2002년 1월 22일</p>
                            <p>#ISTP #사회화 된 내향인 #웃긴사람아닙니다.</p>
                        </div>

                        <div class="memoji-row">
                            <img src="images/seyeon6.png" alt="seyeon memoji 6" />
                            <img src="images/seyeon3.png" alt="seyeon memoji 3" />
                            <img src="images/seyeon4.png" alt="seyeon memoji 4" />
                        </div>
                    </div>
                </div>
            </section>

            
        </main>
    </div>

</body>

</html>
